<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InflationRPG v0.0.32 - 回合制RPG游戏</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 抑制 Chrome 扩展引起的 "message channel closed before a response was received" 警告
      const originalError = console.error;
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('message channel closed before a response was received')) {
          return;
        }
        originalError.apply(console, args);
      };
    </script>
  </body>
</html>
